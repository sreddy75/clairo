<svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- V3: Data flow / insights theme - representing financial clarity -->
  <defs>
    <linearGradient id="v3Grad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#2563eb" />
      <stop offset="100%" style="stop-color:#06b6d4" />
    </linearGradient>
  </defs>

  <!-- Icon: Abstract data/insight symbol - three ascending bars with curve -->
  <rect x="20" y="55" width="8" height="20" rx="2" fill="url(#v3Grad)"/>
  <rect x="32" y="42" width="8" height="33" rx="2" fill="url(#v3Grad)"/>
  <rect x="44" y="28" width="8" height="47" rx="2" fill="url(#v3Grad)"/>

  <!-- Insight arc connecting them -->
  <path d="M24 52 Q38 20 52 28" stroke="url(#v3Grad)" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Dot representing clarity/insight moment -->
  <circle cx="56" cy="25" r="5" fill="#06b6d4"/>

  <!-- Clean modern text -->
  <text x="85" y="65" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#0f172a">clairo</text>
</svg>

<svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- V4: Lens/clarity theme - seeing through complexity -->
  <defs>
    <linearGradient id="v4Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
    <linearGradient id="v4Text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b" />
      <stop offset="100%" style="stop-color:#334155" />
    </linearGradient>
  </defs>

  <!-- Icon: Stylized lens/eye representing clarity -->
  <ellipse cx="40" cy="50" rx="28" ry="22" stroke="url(#v4Grad)" stroke-width="5" fill="none"/>

  <!-- Inner focus ring -->
  <circle cx="40" cy="50" r="10" stroke="url(#v4Grad)" stroke-width="3" fill="none"/>

  <!-- Center clarity dot -->
  <circle cx="40" cy="50" r="4" fill="url(#v4Grad)"/>

  <!-- Light reflection -->
  <circle cx="32" cy="42" r="3" fill="#93c5fd" opacity="0.8"/>

  <!-- Text with gradient -->
  <text x="85" y="66" font-family="Inter, -apple-system, sans-serif" font-size="50" font-weight="700" fill="url(#v4Text)">clairo</text>
</svg>

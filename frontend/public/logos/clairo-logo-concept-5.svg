<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 5: Neural network / AI brain with C -->
  <defs>
    <linearGradient id="neuralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main C shape -->
  <path d="M130 40
           A60 60 0 1 0 130 160"
        stroke="url(#neuralGrad)"
        stroke-width="16"
        stroke-linecap="round"
        fill="none"/>

  <!-- Neural nodes -->
  <circle cx="100" cy="100" r="12" fill="url(#neuralGrad)"/>
  <circle cx="60" cy="70" r="8" fill="#60a5fa"/>
  <circle cx="60" cy="130" r="8" fill="#60a5fa"/>
  <circle cx="85" cy="55" r="6" fill="#93c5fd"/>
  <circle cx="85" cy="145" r="6" fill="#93c5fd"/>
  <circle cx="140" cy="80" r="7" fill="#60a5fa"/>
  <circle cx="140" cy="120" r="7" fill="#60a5fa"/>

  <!-- Neural connections -->
  <line x1="100" y1="100" x2="60" y2="70" stroke="#93c5fd" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="100" x2="60" y2="130" stroke="#93c5fd" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="100" x2="140" y2="80" stroke="#93c5fd" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="100" x2="140" y2="120" stroke="#93c5fd" stroke-width="2" opacity="0.6"/>
  <line x1="60" y1="70" x2="85" y2="55" stroke="#dbeafe" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="130" x2="85" y2="145" stroke="#dbeafe" stroke-width="1.5" opacity="0.5"/>
</svg>

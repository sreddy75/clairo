<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- V4: Constellation style - stars of insight forming clarity -->
  <defs>
    <linearGradient id="n4Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1" />
      <stop offset="50%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#0ea5e9" />
    </linearGradient>
    <filter id="n4Glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Subtle C outline -->
  <path d="M130 35 A65 65 0 1 0 130 165" stroke="url(#n4Grad)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.3"/>

  <!-- Constellation connections (drawn first, behind nodes) -->
  <line x1="55" y1="55" x2="100" y2="100" stroke="url(#n4Grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="40" y1="100" x2="100" y2="100" stroke="url(#n4Grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="55" y1="145" x2="100" y2="100" stroke="url(#n4Grad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="100" x2="145" y2="70" stroke="url(#n4Grad)" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="100" x2="145" y2="130" stroke="url(#n4Grad)" stroke-width="2" opacity="0.6"/>
  <line x1="55" y1="55" x2="75" y2="40" stroke="url(#n4Grad)" stroke-width="1" opacity="0.4"/>
  <line x1="55" y1="145" x2="75" y2="160" stroke="url(#n4Grad)" stroke-width="1" opacity="0.4"/>

  <!-- Outer insight stars -->
  <circle cx="75" cy="40" r="4" fill="#93c5fd" filter="url(#n4Glow)"/>
  <circle cx="55" cy="55" r="7" fill="#60a5fa" filter="url(#n4Glow)"/>
  <circle cx="40" cy="100" r="6" fill="#60a5fa" filter="url(#n4Glow)"/>
  <circle cx="55" cy="145" r="7" fill="#60a5fa" filter="url(#n4Glow)"/>
  <circle cx="75" cy="160" r="4" fill="#93c5fd" filter="url(#n4Glow)"/>

  <!-- Central clarity star (brightest) -->
  <circle cx="100" cy="100" r="16" fill="url(#n4Grad)" filter="url(#n4Glow)"/>
  <circle cx="100" cy="100" r="8" fill="white" opacity="0.4"/>

  <!-- Output clarity nodes -->
  <circle cx="145" cy="70" r="8" fill="url(#n4Grad)" filter="url(#n4Glow)"/>
  <circle cx="145" cy="130" r="8" fill="url(#n4Grad)" filter="url(#n4Glow)"/>
</svg>

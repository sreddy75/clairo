<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- V5: Modern tech - dotted connections, very clean -->
  <defs>
    <linearGradient id="n5Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb" />
      <stop offset="100%" style="stop-color:#1e40af" />
    </linearGradient>
  </defs>

  <!-- Clean bold C -->
  <path d="M128 38 A62 62 0 1 0 128 162" stroke="url(#n5Grad)" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- Dotted connection paths -->
  <path d="M50 70 Q75 85 100 100" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
  <path d="M50 130 Q75 115 100 100" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
  <path d="M100 100 Q125 85 150 80" stroke="url(#n5Grad)" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
  <path d="M100 100 Q125 115 150 120" stroke="url(#n5Grad)" stroke-width="2" stroke-dasharray="4 3" fill="none"/>

  <!-- Input nodes with rings -->
  <circle cx="50" cy="70" r="12" stroke="#60a5fa" stroke-width="2" fill="none"/>
  <circle cx="50" cy="70" r="6" fill="#60a5fa"/>
  <circle cx="50" cy="130" r="12" stroke="#60a5fa" stroke-width="2" fill="none"/>
  <circle cx="50" cy="130" r="6" fill="#60a5fa"/>

  <!-- Central node - prominent -->
  <circle cx="100" cy="100" r="18" stroke="url(#n5Grad)" stroke-width="3" fill="none"/>
  <circle cx="100" cy="100" r="10" fill="url(#n5Grad)"/>

  <!-- Output indicators -->
  <circle cx="150" cy="80" r="6" fill="url(#n5Grad)"/>
  <circle cx="150" cy="120" r="6" fill="url(#n5Grad)"/>
</svg>

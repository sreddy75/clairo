<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 2: Geometric C with ascending bars (growth/clarity) -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Stylized C made of bars -->
  <rect x="30" y="85" width="25" height="30" rx="4" fill="url(#blueGrad)"/>
  <rect x="60" y="55" width="25" height="90" rx="4" fill="url(#blueGrad)"/>
  <rect x="90" y="35" width="25" height="130" rx="4" fill="url(#blueGrad)"/>

  <!-- Curved element forming the C -->
  <path d="M120 35
           Q170 35 170 100
           Q170 165 120 165
           L120 140
           Q145 140 145 100
           Q145 60 120 60
           Z"
        fill="url(#blueGrad)"/>

  <!-- Dot accent -->
  <circle cx="155" cy="100" r="12" fill="#60a5fa"/>
</svg>

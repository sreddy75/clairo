<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 3: Modern minimal C with sparkle (AI clarity) -->
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Clean C arc -->
  <path d="M140 45
           A65 65 0 1 0 140 155"
        stroke="url(#mainGrad)"
        stroke-width="28"
        stroke-linecap="round"
        fill="none"/>

  <!-- AI sparkle/star -->
  <path d="M155 100 L165 85 L155 100 L170 100 L155 100 L165 115 L155 100 L140 100 Z"
        fill="#60a5fa"
        stroke="#60a5fa"
        stroke-width="3"
        stroke-linejoin="round"/>

  <!-- Small accent dots -->
  <circle cx="155" cy="70" r="5" fill="#93c5fd"/>
  <circle cx="165" cy="130" r="4" fill="#93c5fd"/>
</svg>

<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 4: Lens/clarity focus with C -->
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="100" cy="100" r="90" fill="url(#glowGrad)"/>

  <!-- Main C ring (lens shape) -->
  <circle cx="100" cy="100" r="70" stroke="url(#lensGrad)" stroke-width="20" fill="none"/>

  <!-- Gap in C -->
  <rect x="130" y="60" width="60" height="80" fill="white"/>

  <!-- Inner lens highlight -->
  <circle cx="100" cy="100" r="35" stroke="#93c5fd" stroke-width="3" fill="none" opacity="0.6"/>

  <!-- Focus point -->
  <circle cx="100" cy="100" r="10" fill="url(#lensGrad)"/>

  <!-- Lens flare accents -->
  <circle cx="75" cy="75" r="8" fill="#dbeafe" opacity="0.8"/>
  <circle cx="85" cy="85" r="4" fill="white" opacity="0.9"/>
</svg>

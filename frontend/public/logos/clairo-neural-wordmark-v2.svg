<svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Neural wordmark V2 - More compact, integrated -->
  <defs>
    <linearGradient id="nw2Main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb" />
      <stop offset="100%" style="stop-color:#1d4ed8" />
    </linearGradient>
  </defs>

  <!-- Contained in rounded square -->
  <rect x="10" y="15" width="70" height="70" rx="16" fill="url(#nw2Main)"/>

  <!-- White neural network inside -->
  <!-- C arc -->
  <path d="M55 30 A20 20 0 1 0 55 70" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Input nodes -->
  <circle cx="28" cy="38" r="4" fill="white" opacity="0.8"/>
  <circle cx="28" cy="62" r="4" fill="white" opacity="0.8"/>

  <!-- Connections -->
  <line x1="28" y1="38" x2="40" y2="50" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="28" y1="62" x2="40" y2="50" stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- Central clarity node -->
  <circle cx="40" cy="50" r="6" fill="white"/>

  <!-- Text -->
  <text x="95" y="66" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="50" font-weight="700" fill="#0f172a">clairo</text>
</svg>

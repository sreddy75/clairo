    # ============================================
    # BULK REQUEST SCHEMAS
    # ============================================

    BulkRequestCreate:
      type: object
      required: [client_ids]
      properties:
        client_ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 500
        template_id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 200
          description: "Use {client_name} for personalization"
        description:
          type: string
          maxLength: 2000
          description: "Use {client_name}, {period} for personalization"
        due_date:
          type: string
          format: date
        priority:
          type: string
          enum: [low, normal, high, urgent]
          default: normal
        auto_remind:
          type: boolean
          default: true

    BulkRequestResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, processing, completed, failed]
        client_count:
          type: integer
        created_at:
          type: string
          format: date-time

    BulkRequestListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BulkRequestSummary'
        total:
          type: integer

    BulkRequestSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
        client_count:
          type: integer
        success_count:
          type: integer
        failed_count:
          type: integer
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    BulkRequestDetailResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
        client_count:
          type: integer
        success_count:
          type: integer
        failed_count:
          type: integer
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        requests:
          type: array
          items:
            $ref: '#/components/schemas/BulkRequestItem'
          description: Individual request status

    BulkRequestItem:
      type: object
      properties:
        client:
          $ref: '#/components/schemas/ClientBrief'
        request_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: [pending, sent, failed]
        error:
          type: string
          nullable: true

    BulkPreviewResponse:
      type: object
      properties:
        preview:
          type: array
          items:
            $ref: '#/components/schemas/BulkPreviewItem'
        total_count:
          type: integer
        valid_count:
          type: integer
        invalid_count:
          type: integer

    BulkPreviewItem:
      type: object
      properties:
        client:
          $ref: '#/components/schemas/ClientBrief'
        title:
          type: string
          description: Personalized title
        description:
          type: string
          description: Personalized description
        valid:
          type: boolean
        validation_error:
          type: string
          nullable: true

    # ============================================
    # TRACKING SCHEMAS
    # ============================================

    TrackingDashboardResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccountantRequestSummary'
        summary:
          $ref: '#/components/schemas/TrackingSummaryResponse'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    TrackingSummaryResponse:
      type: object
      properties:
        total_requests:
          type: integer
        by_status:
          type: object
          properties:
            draft:
              type: integer
            pending:
              type: integer
            viewed:
              type: integer
            responded:
              type: integer
            complete:
              type: integer
            cancelled:
              type: integer
        overdue_count:
          type: integer
        due_this_week:
          type: integer
        response_rate:
          type: number
          format: decimal
          description: Percentage of requests responded
        avg_response_days:
          type: number
          format: decimal

    # ============================================
    # REMINDER SCHEMAS
    # ============================================

    AutoRemindSettings:
      type: object
      properties:
        enabled:
          type: boolean
        reminder_count:
          type: integer
        last_reminder_at:
          type: string
          format: date-time
          nullable: true
        next_reminder_at:
          type: string
          format: date-time
          nullable: true

    AutoRemindUpdate:
      type: object
      properties:
        enabled:
          type: boolean

    TenantReminderSettings:
      type: object
      properties:
        auto_remind_enabled:
          type: boolean
        reminder_schedule:
          type: array
          items:
            $ref: '#/components/schemas/ReminderScheduleItem'
        max_reminders:
          type: integer
        reminder_time:
          type: string
          description: Time of day to send reminders (HH:MM in tenant timezone)
          example: "09:00"

    TenantReminderSettingsUpdate:
      type: object
      properties:
        auto_remind_enabled:
          type: boolean
        reminder_schedule:
          type: array
          items:
            $ref: '#/components/schemas/ReminderScheduleItem'
        max_reminders:
          type: integer
          minimum: 1
          maximum: 10
        reminder_time:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'

    ReminderScheduleItem:
      type: object
      properties:
        days_before_due:
          type: integer
          nullable: true
          description: Days before due date (positive) or null for after
        days_after_due:
          type: integer
          nullable: true
          description: Days after due date or null for before
        template:
          type: string
          enum: [reminder_3_days, reminder_1_day, overdue_1_day, overdue_3_days, overdue_7_days]

    SendReminderResponse:
      type: object
      description: Response after sending a manual reminder
      properties:
        request_id:
          type: string
          format: uuid
        reminder_count:
          type: integer
          description: Total number of reminders sent for this request
        last_reminder_at:
          type: string
          format: date-time
          description: Timestamp of this reminder

    # ============================================
    # ERROR SCHEMA
    # ============================================

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
          nullable: true

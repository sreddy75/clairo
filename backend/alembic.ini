# Clairo Alembic Configuration
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = alembic

# Template for migration file names
# Use ISO 8601 timestamp for better sorting
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Truncate long column names in autogenerate
truncate_slug_length = 40

# Set to 'true' to run migrations offline
prepend_sys_path = .

# Timezone for migration timestamps
timezone = UTC

# Version path separator
version_path_separator = os

# Number of characters for short revision hash
revision_environment = false

# Sourceless migration files (Python bytecode only)
sourceless = false

# Track table ordering for FKs
version_locations = %(here)s/alembic/versions

# Output encoding
output_encoding = utf-8

# Database URL - overridden by env.py at runtime
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Optional: Run ruff formatting on generated migrations
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

name: Non-geared unit trusts
categories:
- Business_structures
implementation_text: 'The process is:

  1. Establish non-greared unit trust.

  2. Ensure the NGUT complies with SMSF 2009/4 so the SIS Act is not breached.'
explanation_text: 'Non-geared unit trusts (NGUT) allow taxpayers to co-invest with their SMSF in a property.
  The benefits of the NGUT structure include the following:

  Enables an SMSF with limited funds to co-invest in large property purchases.

  The SMSF can purchase additional units in the NGUT from related parties (at market value).

  The NGUT has flexibility in issuing and redeeming units.

  Unlike a bare trust, there are no restrictions on undertaking property development.

  Borrowing costs are lower than those of limited recourse borrowing arrangements, as non-SMSF members
  can borrow directly from the bank to purchase units in the unit trust.'

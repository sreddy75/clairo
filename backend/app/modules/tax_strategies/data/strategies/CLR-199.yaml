strategy_id: CLR-199
source_ref: STP-199
name: Migrant language training
categories:
- Employees
- Business
implementation_text: 1. The migrant language training should be provided and paid for by the employer.
explanation_text: 'Language training courses designed to teach English or explain Australian citizenship
  and lifestyle to a person who is, or intends to become, an immigrant of Australia are tax-deductible
  to the employer and FBT-exempt. The travel costs incurred are also exempt. To qualify for the exemption:


  • The benefit must be an expense payment benefit.

  • Migrant language training is provided to an employee or associate.


  In contrast, language training courses paid for by an employee will be deemed private and non-deductible.
  The course will be private even when the English language course assists employees in doing their job.'

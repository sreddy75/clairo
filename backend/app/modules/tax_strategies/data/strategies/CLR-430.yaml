name: Super fund trustee company
categories:
- Business_structures
implementation_text: '1. Incorporate the special purpose company with ASIC.

  2. Apply for ABN and TFN.'
explanation_text: 'A super fund trustee company is a type of special-purpose proprietary company that
  is only permitted to act as trustee of a self-managed superannuation fund and cannot trade in any form
  or act as a trustee of any other trust. A super fund trustee company''s constitution must contain a
  clause prohibiting the company from distributing income or property to its members and limiting its
  ability to act in any other capacity.


  Superfund trustee companies are a type of specialised company and are subject to a reduced annual return
  fee of $53.'

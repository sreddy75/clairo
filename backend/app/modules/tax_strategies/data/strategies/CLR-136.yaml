strategy_id: CLR-136
source_ref: STP-136
name: Allocating the purchase price of business assets acquired
categories:
- Business
implementation_text: '1. Ideally, the client (whether a vendor or purchaser) will structure the transaction
  to allocate the purchase price of the business assets in the most tax-effective manner.

  2. Where the contract of sale does not allocate the total purchase price amongst the assets acquired,
  the purchaser can make that allocation themselves (subject to the values assigned to the various assets
  being commercially realistic).

  3. Even where the purchase contract allocates values to the assets acquired, the purchaser can change
  those assigned values if they are incorrect or unreasonable. These changes should be supported by independent
  evidence and documentation.'
explanation_text: 'When buying a business, the purchaser may be acquiring the following different asset
  components:

  Goodwill,

  Trading stock,

  Freehold property, and

  Depreciating assets and intellectual property.


  If the sale contract allocates the total purchase price between the asset components acquired, the purchaser
  takes those values for tax purposes. So, for example, a $1,000,000 sales contract could allocate $500,000
  to goodwill, $250,000 to depreciating assets and $250,000 to stock. From the purchaser''s point of view,
  they would prefer larger values for the depreciable purchases and less for the goodwill. The depreciable
  assets will provide the purchaser with tax deductions for the depreciation expenses in future years.
  In contrast, there is no write-off for goodwill, as it is a capital asset.'

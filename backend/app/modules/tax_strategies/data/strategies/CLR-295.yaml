strategy_id: CLR-295
source_ref: STP-295
name: On the 1st July 2024 individual tax rates are reduced
categories:
- Employees
- Business
implementation_text: '1. Move taxable income from the 2023/24 income year to the 2024/25 income year to
  take advantage of reduced individual tax rates.

  2. Prepay eligible expenses before 30 June 2024 to reduce taxable income in the 2023/24 income year.

  3. Defer income that would otherwise be received in 2023/24 into the 2024/25 income year.'
explanation_text: 'On the 1st of July 2024, individual tax rates are reduced. Consequently, tax can be
  saved by moving taxable income from 2023/24 to 2024/25. This can be achieved by:

  • Prepaying expenses in 2023/24.

  • Deferring income from 2023/24 to 2024/25.'

implementation_text: ''
explanation_text: 'As superannuation is subject to tax rates of 0%, 10% or 15%, it provides many opportunities
  to save. Then once the flexibility of SMSFs is included, the possibilities expand even further.


  Ten superannuation strategies that save tax:

  Concessional super contributions.

  5-year catch-up super contributions.

  Start a pension in an SMSF.

  Transfer personal investments into super.

  Using an SMSF to undertake property development.

  Transferring business premises into an SMSF.

  SMSF borrowings.

  SMSFs investing in non-controlled entities.

  Super contributions from downsizing.

  Life insurance is held through super.'

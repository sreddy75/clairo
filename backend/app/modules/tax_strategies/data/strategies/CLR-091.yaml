strategy_id: CLR-091
source_ref: STP-091
name: Main residence exemption
categories:
- Employees
- Rental_properties
implementation_text: 1. If a taxpayer has several main residences, claim the main residence exemption
  on the property which has made the largest capital gain.
explanation_text: The primary residence is a tax-effective investment because if the principal residence
  exemption applies, any capital gains made on the home's sale are tax-free. The main residence exemption
  generally refers to a dwelling owned by the taxpayer to the extent the housing was the taxpayer's principal
  residence and not used for income-earning purposes during the ownership period. The primary home can
  be located in Australia or overseas. A taxpayer can have several principal places at the same time.
  If this is the case, then when selling a property, they should apply the main residence exemption to
  the property which has made the largest capital gain.

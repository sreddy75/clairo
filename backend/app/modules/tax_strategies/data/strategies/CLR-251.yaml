strategy_id: CLR-251
source_ref: STP-251
name: Safety award
categories:
- Business
implementation_text: '1. Ensure any safety awards paid are limited to $200 per employee annually.

  2. Document the reasons why the award was given.'
explanation_text: The grant of an award genuinely related to occupational health or occupational safety
  achievements to an employee is exempt from FBT tax if its value doesn't exceed $200. The award payment
  is also tax-deductible to the employer and tax-free to the employee.

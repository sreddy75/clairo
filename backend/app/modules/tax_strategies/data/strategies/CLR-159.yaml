strategy_id: CLR-159
source_ref: STP-159
name: Varying partners distributions
categories:
- Business
implementation_text: '1. Prior to 30th June review the individual partner''s contributions and consider
  whether their partner''s salaries should be revised.

  2. Document any changes in partners'' salaries & the reasons why the changes were made in writing.'
explanation_text: Both common-law partnerships and written partnership agreements allow the partners of
  a partnership to vary the amount a partner draws as a 'partner salary'. The agreement must be entered
  into before the end of that income year to be valid for tax purposes in an income year. The partner's
  salary should be based on the individual partner's participation and contribution to the partnership
  business.

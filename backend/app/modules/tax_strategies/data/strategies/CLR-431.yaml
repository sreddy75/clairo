implementation_text: ''
explanation_text: 'A trustee company is a legal entity that acts as a fiduciary, agent or trustee on behalf
  of a person or business for administration, management and the eventual transfer of assets to a beneficial
  party.


  Trustee companies provide independent trustee services and can undertake the following activities:


  Producing offer documents

  Overseeing investment decisions

  Adhering to legislative and regulatory requirements

  Custody services

  Management of external service providers

  Scheme administration

  Fund and unit accounting

  Registry services'

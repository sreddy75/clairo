strategy_id: CLR-035
source_ref: STP-035
name: Temporary residents
categories:
- Employees
implementation_text: '1. Obtain the Medicare levy exemption certificate from Medicare office to avoid
  paying the medicare levy on taxable income.

  2. Claim the medicare levy exemption in the individual tax return.'
explanation_text: Unlike Australian tax residents, temporary residents are only taxed on their Australian
  source income. This means their foreign-sourced income isn't taxed in Australia. Also, temporary residents
  only pay capital gains tax on the sale of Australian property. From 9th May 2017, temporary residents
  can no longer access the CGT principal residence exemption. Any capital gains made on the sale of Australian
  shares are tax-free. Temporary residents are not entitled to access the Medicare health system when
  living in Australia and require their private health coverage. As such, temporary residents will be
  exempt from paying the Medicare levy (2% of taxable income). They need a Medicare levy exemption certificate
  to claim the Medicare levy exemption.

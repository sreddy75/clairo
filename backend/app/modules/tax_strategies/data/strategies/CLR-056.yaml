strategy_id: CLR-056
source_ref: STP-056
name: Dividend deductions
categories:
- Investors_retirees
implementation_text: 1. Interest on loans used to buy shares will only be deductible where the shares
  pay a dividend or could potentially pay a dividend. As such, interest on loans used to purchase mining
  exploration companies, for example, will be nondeductible (and instead, the interest will be added to
  the cost base for capital gains tax purposes).
explanation_text: 'The following expenses are generally deductible against dividend income:

  Interest and borrowing costs on loans where the borrowed funds buy shares.

  Ongoing management fees are paid to financial planners, stockbrokers, and investment managers.

  Travel expenses for visiting investment managers, attending company meetings, etc.

  Investment journals, subscriptions, and training.

  Computer depreciation and software programmes.

  Telephone, internet and home office running costs.'

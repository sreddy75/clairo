strategy_id: CLR-202
source_ref: STP-202
name: Business registrations
categories:
- ATO_obligations
- Recommendations
implementation_text: '1. Register for an Australian Business Number (ABN) to identify your business, claim
  GST credits, confirm your business identity when ordering and invoicing, and avoid PAYG tax on payments
  received.

  2. Obtain a Tax File Number (TFN), using your personal TFN if operating as a sole trader or partnership,
  or registering a separate TFN if operating as a company or trust.

  3. Register a business name if you are carrying out business under a name different from your own.'
explanation_text: 'The Australian Taxation Office (ATO) requires businesses in Australia to complete various
  registrations, including:

  1. Australian business number (ABN): An 11-digit number that identifies your business and allows you
  to claim Goods and Services Tax (GST) credits, confirm your business identity to others when ordering
  and invoicing, and avoid Pay as You Go (PAYG) tax on payments you receive.

  2. Tax file number (TFN): An individual operating as a sole trader or partnership should use their personal
  TFN for tax matters, while companies and trusts need a separate TFN.

  3. Business name registration: It is essential if carrying out business under a different name.'

name: General pool balance less than $20,000
categories:
- Business
implementation_text: 1. Writing off the general pool balance if it is below $20,000 on 30th June 2025.
explanation_text: 'The simplified depreciation rules allow:

  The immediate write-off for depreciating assets is if they are below the write-off thresholds applying
  to that financial year.

  Pooling with other depreciating assets in the general pool and declining at a 15% diminishing value
  rate in the first year and 30% after that. Writing off the general pool balance if it is below $20,000
  on 30th June 2025. This write-off is only allowed if the year''s depreciation deduction plus the closing
  pool balance total is less than $20,000.'

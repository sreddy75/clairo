strategy_id: CLR-409
source_ref: STP-409
name: Farm discretionary trust
categories:
- Business_structures
implementation_text: 'The process is:

  1. Establish a company as a trustee (best practice).

  2. Establish the farm discretionary trust.'
explanation_text: 'Farm discretionary trusts are used to acquire land for primary production while providing
  flexibility so the property can eventually be transferred to other family members. There is a stamp
  duty exemption available for the transfer of farming land:

  • From one or more individuals who are family members or a company whose shareholders comprise those
  persons to a discretionary farm trust.

  • From a discretionary farm trust to one or more individuals who are members of the family.'

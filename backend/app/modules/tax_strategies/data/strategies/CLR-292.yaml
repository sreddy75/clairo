strategy_id: CLR-292
source_ref: STP-292
name: Transfer personal investments into super
categories:
- Investors_retirees
- SMSF
implementation_text: '1. Calculate the capital gains tax liability on investments that could be transferred
  to the super fund - this will depend on the taxpayer''s original cost price of the assets, the market
  prices on the date of transfer, and whether any small business CGT concessions apply.

  2. Calculate the stamp duty payable on transferring investments into the super fund - this depends on
  the State Government involved and vary''s from nil to concessional stamp duty to total stamp duty rates.

  3. Work out which individual investments make sense to transfer now and which ones to transfer later
  or not.

  4. Sell those specific investments (shares and property) to the super fund at market value and complete
  the relevant transfer documentation.

  5. Pay any applicable stamp duty.'
explanation_text: 'This strategy involves a taxpayer selling listed securities (whether shares or managed
  funds) and commercial properties into their super fund. The title of the investments is then in the
  super fund name and the super fund accounts for any income generated by the assets.


  The benefits of this strategy include the following:


  - The individual can receive a tax deduction for super contributions into the super fund that are satisfied
  by transferring the investments (subject to the concessional superannuation contributions caps).

  - The tax payable on the investment income generated by the super fund investments is taxed at a maximum
  rate of 15% and can be as low as 0%.

  - A super fund investment is protected and quarantined if an individual goes bankrupt.

  - Depending on the super fund''s taxable income, the ATO may refund part or all of the imputation credits
  on the super fund''s investments.'

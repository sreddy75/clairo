strategy_id: CLR-197
source_ref: STP-197
name: Long service awards
categories:
- Business
implementation_text: '1. Ensure the long service leave awards paid don''t exceed the relevant maximum
  amount.

  2. The employer pays the long service leave award to the employee and claims a tax deduction for the
  payment.'
explanation_text: 'Long service awards granted in recognition of 15 years or more service are tax-deductible
  to the employer, non-taxable to the employee, and FBT exempt, provided the value of the award doesn''t
  exceed the following specified amounts:

  $1,000 for 15 years of service.

  Plus, $100 per additional year of service.'

name: 8 ways to put more money into super
categories:
- SMSF
implementation_text: ''
explanation_text: 'Eight ways to get more money into super:

  1. Annual concessional contributions cap - $30,000 pa

  2. Annual non concessional contributions cap - $120,000

  3. Downsizer contributions - Up to $300,000.

  4. Non-concessional super contributions ''bring forward'' arrangement - $360,000.

  5. Five year catch up concessional contributions.

  6. Small business CGT cap - $1,705,000

  7. Spouse super contribution offset.

  8. Government co-contribution'

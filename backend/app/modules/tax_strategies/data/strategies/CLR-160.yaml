strategy_id: CLR-160
source_ref: STP-160
name: Customer disputed amounts
categories:
- Business
implementation_text: 1. Record the disputed income in the financials as a liability.
explanation_text: For businesses operating on an accrual basis, income subject to a client dispute may
  be deferred until the dispute is settled. The disputed income should be recorded in the financials as
  a liability and only registered as income when the conflict is finalised.

strategy_id: CLR-140
source_ref: STP-140
name: Change PSI into business income
categories:
- Business
implementation_text: '1. Review whether the business can be restructured so the income is no longer PSI.

  2. Implement one of the four strategies to change PSI income into business income. Restructure thebusinesses
  to make non-PSI income (if the business owner will make the appropriate changes and investment).

  3. Even if the income is PSI, operating the business through a PSI entity saves tax.'
explanation_text: 'Personal services income (PSI) is mainly from an individual''s skills or efforts and
  has employment income characteristics. With PSI income, the deductions are limited to those an employee
  would be entitled to deduct.If it''s possible to change PSI into business income, the taxpayer gains
  the following benefits:

  You are entitled to deduct a more extensive range of business expenses from the income.

  Can employ family members and pay them wages and superannuation.

  Can operate through a company structure and retain the profits in the company -tax rate reduced to a
  flat 25%.

  Can operate through a trust structure and distribute income to family members.


  Four strategies to change PSI into business income are:

  Ensure less than 50% of the contract price received relates to the individual''s labour, skills or expertise.
  For example, a fence installer where the fence materials are higher than 50% of the contract price.

  Have employees generate more than 50% of the firm''s total income—for example, a sole practitioner accountant
  employs two accountants.

  Where the income is from the sale of goods, not services.

  Have more than 50% of the income generated by equipment and assets, e.g. trucks, bobcats, etc.'

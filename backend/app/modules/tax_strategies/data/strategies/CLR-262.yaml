strategy_id: CLR-262
source_ref: STP-262
name: External training expenditure
categories:
- Business
implementation_text: ''
explanation_text: 'A 20% bonus deduction applies to eligible external training for business employees.
  The eligibility criteria include the following:


  - The expenditure must be charged by a registered training provider and be within the scope of the provider''s
  registration.

  - The registered training provider must not be the entity claiming the additional deduction or an associate
  of the entity.

  - This doesn''t apply to training sole traders, partners in a partnership and independent contractors.

  - Businesses must have a turnover of less than $50 million.

  - Applies to expenditures incurred between 29 March 2022 and 30 June 2024.'

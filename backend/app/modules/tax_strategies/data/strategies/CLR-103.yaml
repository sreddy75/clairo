strategy_id: CLR-103
source_ref: STP-103
name: X-Box, Foxtel, and pinball machines
categories:
- Business
implementation_text: 1. Each item of equipment that costs less than the instant asset write-off limit
  is tax deductible upfront.
explanation_text: 'Having fun in the workplace:


  Increases morale and motivation,

  Develops a positive staff culture,

  Increases productivity and performance,

  It makes staff recruitment easier and less expensive,

  Improves teamwork,

  Enhances creativity,

  Resolves conflicts, and

  Improves employee loyalty.


  The Australian Taxation Office has acknowledged that Australian workplaces have changed and that entertainment-related
  items increase employee productivity. An X-box, Foxtel, pinball machines, etc., can be purchased for
  an office for employees to use during their work breaks. Each item of equipment that costs less than
  $20,000 will be tax deductible upfront.'

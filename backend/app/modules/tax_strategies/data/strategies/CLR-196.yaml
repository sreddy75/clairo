strategy_id: CLR-196
source_ref: STP-196
name: FBT exempt work-related items
categories:
- Employees
- Business
implementation_text: '1. Have the employer purchase the FBT exempt work-related items and claim an upfront
  tax deduction for their cost.

  2. The employee salary sacrifices the cost of the items (ex GST).'
explanation_text: 'Providing the following work-related items to employees is tax-deductible and FBT-exempt:

  Portable electronic devices include mobile phones, laptops, tablets, portable printers and GPS navigation
  receivers.

  Computer software.

  Protective clothing

  Briefcases.

  Tools of the trade.


  When employees'' salary sacrifice the cost of the items with their employer, they benefit from saving
  the GST and also having an upfront tax saving (instead of purchasing the item and depreciating it over
  several years in their tax return). The FBT exemption is limited to items primarily for use in the employee''s
  employment and one per FBT year for items with substantially identical functions unless the item is
  a replacement item. An exception to this rule allows small businesses to provide employees with more
  than one work-related portable electronic device in an FBT year - even if the devices have substantially
  identical functions.'

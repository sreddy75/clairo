explanation_text: 'Tax-saving investments achieve the twin aims of simultaneously saving tax and being
  an investment. Twelve tax-saving investments are:

  Concessional super contributions.

  Negative gearing shares or property.

  Negatively gearing the family home.

  Early-stage investors.

  Exploration development incentive.

  Farm management deposits.

  Agribusiness schemes.

  Film industry incentives.

  Art.

  Antique, veteran or vintage car

  Purchase a farm or winery.

  Holiday homes.'

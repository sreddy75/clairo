name: Investment bonds
categories:
- Investors_retirees
implementation_text: '1. Consider whether investment bonds should be part of your diversified investment
  portfolio.

  2. Research the different investment bond options or get advice from a financial planner.

  3. Purchase investment bonds.

  4. Hold the investment bonds for ten years - To access the tax concessions.'
explanation_text: 'Investment bonds (insurance bonds) are tax-efficient long-term investment vehicles.
  Investment bonds are structured as a life insurance policy under the Life Insurance Act 1995, requiring
  the life insured and beneficiaries to be nominated. Life insurers and friendly societies can only issue
  investment bonds. Investment bonds are tax effective for the following reasons:


  • Investment income is taxed at the 30% corporate rate, and the bond issuer pays the tax.

  • If the investor holds the investment bonds for at least ten years, any capital growth on the investment
  will be tax-free.

  • The annual investment bond income is not distributed to the investor but reinvested, so compounding
  occurs.


  Investment bonds now include various investment options, including diversified funds, multi-manager
  funds, capital guaranteed, Australian share funds, bond funds, etc. The returns generated by the investment
  bonds will depend on how the underlying investments perform but average 5-8% pa. Investment bonds attract
  investors in high tax brackets (higher than 30%), investors with long-term investing horizons (more
  than ten years), and investors who don''t require regular income.'

# Authoritative mapping of Australian tax-law section identifiers to their owning Act.
#
# Reviewed by domain experts. Extend via PR.
#
# Key format: normalised section identifier (lowercased, whitespace-stripped,
# no "s"/"section "/"sec." prefix, token up to first whitespace). For example,
# "s 82KZM ITAA 1936" → key "82kzm".
#
# Spec: specs/061-citation-validation/spec.md (FR-007).
# Schema: specs/061-citation-validation/contracts/section_act_mapping.schema.yaml.
#
# ⚠️  REQUIRES DOMAIN-EXPERT REVIEW before shipping to UAT. The initial seed
#     here is curated from frequently-cited Australian tax-planning sections;
#     verify act attribution against the ATO Legal Database before relying on
#     any individual entry. Flag ambiguous / renumbered sections during review.

